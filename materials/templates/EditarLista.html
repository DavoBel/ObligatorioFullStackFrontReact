<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Lista</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .sidebar {
        min-height: 100vh;
        position: sticky;
        top: 0;
        align-self: flex-start;
        background-color: #247326;
    }

    #contenidoPricipal {
        background-color: #e1fce2;
        width: 100%;
    }

    .btn-primary {
        background-color: #43a847;
        border-color: #43a847;
    }

    .btn-primary:hover {
        background-color: #247326;
        border-color: #247326;
    }

    .btn-primary:focus,
    .btn-primary:focus-visible {
        background-color: #43a847 !important;
        border-color: #43a847 !important;
        box-shadow: none !important;
    }

    .sidebar .btn-primary {
        background-color: #013d03 !important;
        border-color: #013d03 !important;
        color: white;
    }

    .form-card {
        max-width: 500px;
        width: 100%;
    }

    /* Modal sin JavaScript usando :target */
    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1050;
        justify-content: center;
        align-items: center;
    }

    .modal-overlay:target {
        display: flex;
    }

    .modal-box {
        background: white;
        border-radius: 8px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .modal-header-custom {
        background-color: #43a847;
        color: white;
        padding: 1rem 1.25rem;
        border-radius: 8px 8px 0 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-close {
        color: white;
        text-decoration: none;
        font-size: 1.4rem;
        line-height: 1;
    }

    .modal-close:hover {
        color: #d4edda;
    }

    .modal-body-custom {
        padding: 1.5rem 1.25rem;
    }

    .modal-footer-custom {
        padding: 1rem 1.25rem;
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
        border-top: 1px solid #dee2e6;
    }
</style>
<body>
    <div class="d-flex">
        <nav class="sidebar text-center text-white p-3" style="width: 220px;">
            <h5 class="text-white mb-4">Voy al Super!</h5>
            <ul class="nav flex-column gap-3 text-center">
                <li class="nav-item">
                    <a href="#" class="btn btn-primary w-100">Listas</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="btn btn-primary w-100">Uso</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="btn btn-primary w-100">Cambiar Plan</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="btn btn-danger w-100">Cerrar sesión</a>
                </li>
            </ul>
        </nav>

        <div id="contenidoPricipal" class="p-4 d-flex justify-content-center align-items-start">
            <div class="card shadow form-card">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Editar Lista</h5>
                </div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label for="editNombre" class="form-label fw-semibold">Nombre</label>
                            <input type="text" id="editNombre" class="form-control" placeholder="Nombre de la lista" required>
                        </div>

                        <div class="mb-3">
                            <label for="editPresupuesto" class="form-label fw-semibold">Presupuesto</label>
                            <input type="number" id="editPresupuesto" class="form-control" min="0" step="1" placeholder="Ej: 1000" required>
                        </div>

                        <div class="mb-4">
                            <label for="editEstado" class="form-label fw-semibold">Estado</label>
                            <select id="editEstado" class="form-select" required>
                                <option value="true">Activa</option>
                                <option value="false">Inactiva</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary w-100">Guardar cambios</button>
                            <a href="#" class="btn btn-outline-secondary w-100">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
