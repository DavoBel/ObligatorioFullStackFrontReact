<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Agregar Categoría</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
    .sidebar {
        min-height: 100vh;
        position: sticky;
        top: 0;
        align-self: flex-start;
        background-color: #1a1a2e;
    }

    #contenidoPrincipal {
        background-color: #f4f6f9;
        width: 100%;
    }

    .sidebar .btn-nav {
        background-color: transparent;
        border: none;
        color: #adb5bd;
        text-align: left;
        width: 100%;
        padding: 8px 12px;
        border-radius: 6px;
        text-decoration: none;
    }

    .sidebar .btn-nav:hover,
    .sidebar .btn-nav.active {
        background-color: #343a57;
        color: white;
    }

    .sidebar a {
        text-decoration: none;
    }

    .form-card {
        max-width: 500px;
        width: 100%;
    }
</style>
<body>
    <div class="d-flex">
        <nav class="sidebar text-white p-3" style="width: 220px;">
            <h6 class="text-uppercase text-secondary mb-4 small fw-bold px-2">Admin Panel</h6>
            <ul class="nav flex-column gap-1">
                <li class="nav-item">
                    <a href="Productos.html" class="btn-nav d-block">
                        <i class="bi bi-box-seam me-2"></i> Productos
                    </a>
                </li>
                <li class="nav-item">
                    <a href="Usuarios.html" class="btn-nav d-block">
                        <i class="bi bi-people me-2"></i> Usuarios
                    </a>
                </li>
                <li class="nav-item">
                    <a href="Estadisticas.html" class="btn-nav d-block">
                        <i class="bi bi-bar-chart me-2"></i> Estadísticas
                    </a>
                </li>
                <li class="nav-item">
                    <a href="Categorias.html" class="btn-nav d-block active">
                        <i class="bi bi-tag me-2"></i> Categorías
                    </a>
                </li>
                <li class="nav-item mt-3">
                    <a href="../login.html" class="btn-nav d-block text-danger">
                        <i class="bi bi-box-arrow-left me-2"></i> Cerrar sesión
                    </a>
                </li>
            </ul>
        </nav>

        <div id="contenidoPrincipal" class="p-4 d-flex justify-content-center align-items-start">
            <div class="card shadow-sm form-card">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="bi bi-plus-lg me-2"></i>Agregar Categoría</h5>
                </div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-semibold">Nombre</label>
                            <input type="text" id="nombre" class="form-control" placeholder="Ej: Lácteos" required>
                        </div>

                        <div class="mb-4">
                            <label for="descripcion" class="form-label fw-semibold">Descripción</label>
                            <textarea id="descripcion" class="form-control" rows="3" placeholder="Ej: Leche, queso, yogur y derivados."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-check-lg me-1"></i> Guardar
                            </button>
                            <a href="Categorias.html" class="btn btn-outline-secondary w-100">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
