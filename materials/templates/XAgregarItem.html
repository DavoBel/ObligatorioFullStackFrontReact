<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Item</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .sidebar {
        min-height: 100vh;
        position: sticky;
        top: 0;
        align-self: flex-start;
        background-color: #247326;
    }

    #contenidoPricipal {
        background-color: #e1fce2;
        width: 100%;
    }

    .btn-primary {
        background-color: #43a847;
        border-color: #43a847;
    }

    .btn-primary:hover {
        background-color: #247326;
        border-color: #247326;
    }

    .btn-primary:focus,
    .btn-primary:focus-visible {
        background-color: #43a847 !important;
        border-color: #43a847 !important;
        box-shadow: none !important;
    }

    .sidebar .btn-primary {
        background-color: #013d03 !important;
        border-color: #013d03 !important;
        color: white;
    }

    .form-card {
        max-width: 500px;
        width: 100%;
    }
</style>
<body>
    <div class="d-flex">
        <nav class="sidebar text-center text-white p-3" style="width: 220px;">
            <h5 class="text-white mb-4">Voy al Super!</h5>
            <ul class="nav flex-column gap-3 text-center">
                <li class="nav-item">
                    <a href="#" class="btn btn-primary w-100">Listas</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="btn btn-primary w-100">Uso</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="btn btn-primary w-100">Cambiar Plan</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="btn btn-danger w-100">Cerrar sesión</a>
                </li>
            </ul>
        </nav>

        <div id="contenidoPricipal" class="p-4 d-flex justify-content-center align-items-start">
            <div class="card shadow form-card">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Agregar Item</h5>
                </div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label for="producto" class="form-label fw-semibold">Producto</label>
                            <select id="producto" class="form-select" required>
                                <option value="" disabled selected>Cargando productos...</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="unidad" class="form-label fw-semibold">Unidad</label>
                            <input type="text" id="unidad" class="form-control" placeholder="Kg" disabled>
                        </div>

                        <div class="mb-3">
                            <label for="cantidad" class="form-label fw-semibold">Cantidad</label>
                            <input type="number" id="cantidad" class="form-control" min="1" placeholder="Ej: 2" required>
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-semibold">Breve descripción</label>
                            <input type="text" id="descripcion" class="form-control" maxlength="100" placeholder="Ej: Sin TACC, marca X...">
                        </div>

                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="fueComprado">
                                <label class="form-check-label fw-semibold" for="fueComprado">
                                    Fue comprado
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary w-100">Guardar</button>
                            <a href="#" class="btn btn-outline-secondary w-100">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
