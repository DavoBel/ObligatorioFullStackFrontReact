<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Usuarios</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
    .sidebar {
        min-height: 100vh;
        position: sticky;
        top: 0;
        align-self: flex-start;
        background-color: #1a1a2e;
    }

    #contenidoPrincipal {
        background-color: #f4f6f9;
        width: 100%;
    }

    .sidebar .btn-nav {
        background-color: transparent;
        border: none;
        color: #adb5bd;
        text-align: left;
        width: 100%;
        padding: 8px 12px;
        border-radius: 6px;
    }

    .sidebar .btn-nav:hover,
    .sidebar .btn-nav.active {
        background-color: #343a57;
        color: white;
    }

    .table thead th {
        background-color: #1a1a2e;
        color: white;
        font-weight: 500;
        border: none;
    }

    .table tbody tr:hover {
        background-color: #e8f5e9;
    }

    .sidebar a {
        text-decoration: none;
    }
</style>
<body>
    <div class="d-flex">
        <nav class="sidebar text-white p-3" style="width: 220px;">
            <h6 class="text-uppercase text-primary mb-4 small fw-bold px-2">Voy al Super!</h6>
            <ul class="nav flex-column gap-1">
                <li class="nav-item">
                    <a href="Productos.html" class="btn-nav d-block">
                        <i class="bi bi-box-seam me-2"></i> Productos
                    </a>
                </li>
                <li class="nav-item">
                    <a href="Usuarios.html" class="btn-nav d-block active">
                        <i class="bi bi-people me-2"></i> Usuarios
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="btn-nav d-block">
                        <i class="bi bi-bar-chart me-2"></i> Estadísticas
                    </a>
                </li>
                <li class="nav-item">
                    <a href="Categorias.html" class="btn-nav d-block">
                        <i class="bi bi-tag me-2"></i> Categorías
                    </a>
                </li>
                <li class="nav-item mt-3">
                    <a href="#" class="btn-nav d-block text-danger">
                        <i class="bi bi-box-arrow-left me-2"></i> Cerrar sesión
                    </a>
                </li>
            </ul>
        </nav>

        <div id="contenidoPrincipal" class="p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">Usuarios</h4>
                <button class="btn btn-success btn-sm">
                    <i class="bi bi-plus-lg me-1"></i> Nuevo usuario
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0 align-middle">
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Nombre</th>
                                <th>Rol</th>
                                <th>Plan</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>admin@super.com</td>
                                <td><strong>Carlos García</strong></td>
                                <td><span class="badge bg-danger">Admin</span></td>
                                <td><span class="badge bg-warning text-dark">PREMIUM</span></td>
                                <td>
                                    <a href="#" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                    <a href="#" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                                </td>
                            </tr>
                            <tr>
                                <td>juan@hotmail.com</td>
                                <td><strong>Juan Pérez</strong></td>
                                <td><span class="badge bg-secondary">Usuario</span></td>
                                <td><span class="badge bg-light text-dark border">PLUS</span></td>
                                <td>
                                    <a href="#" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                    <a href="#" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
